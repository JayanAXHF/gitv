name: Nix CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["*"]

jobs:
  nix:
    runs-on: ubuntu-latest

    steps:   
      - uses: actions/checkout@v7
      - name: Install nix
        uses: cachix/install-nix-action@v31
      - name: Check flake
        run: nix flake check
