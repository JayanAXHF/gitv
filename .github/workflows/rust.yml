name: Tests and Benchmarks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Run tests
        run: cargo test --verbose
      - name: Run benchmarks
        run: cargo bench -F benches
